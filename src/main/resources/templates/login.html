<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
</head>
<body>
<h2>Iniciar Sesión</h2>

<form th:action="@{/login}" method="post">
    <label for="username">Usuario:</label>
    <input type="text" id="username" name="username" required />
    <br/><br/>

    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password" required />
    <br/><br/>

    <button type="submit">Ingresar</button>
</form>

<!-- Mensajes de error o éxito -->
<div th:if="${param.error}">
    <p style="color: red;">Usuario o contraseña inválidos</p>
</div>

<div th:if="${param.logout}">
    <p style="color: green;">Has cerrado sesión correctamente</p>
</div>

<div th:if="${param.registrado}">
    <p style="color: blue;">Usuario registrado con éxito. ¡Ahora puedes iniciar sesión!</p>
</div>

<p><a href="/registro">¿No tienes cuenta? Regístrate aquí</a></p>
</body>
</html>
