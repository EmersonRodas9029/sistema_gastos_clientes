<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
</head>
<body>
<h2>Registro de Usuario</h2>

<form th:action="@{/registro}" th:object="${usuario}" method="post">
    <label for="username">Nombre de Usuario:</label>
    <input type="text" id="username" th:field="*{username}" required />
    <br/><br/>

    <label for="password">Contraseña:</label>
    <input type="password" id="password" th:field="*{password}" required />
    <br/><br/>

    <label for="rol">Rol:</label>
    <select id="rol" th:field="*{rol}" required>
        <option value="">Seleccione...</option>
        <option value="CONTADOR">Contador</option>
        <option value="ASISTENTE">Asistente</option>
        <option value="CLIENTE">Cliente</option>
    </select>
    <br/><br/>

    <label for="clienteId">ID del Cliente (solo si es CLIENTE):</label>
    <input type="number" id="clienteId" th:field="*{clienteId}" />
    <br/><br/>

    <button type="submit">Registrar</button>
</form>

<p><a href="/login">¿Ya tienes cuenta? Inicia sesión</a></p>
</body>
</html>
